<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صيدليتي الذكية 💊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; }
        .medicine-card { transition: transform 0.2s; }
        .medicine-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="bg-green-600 text-white p-4 shadow-lg mb-8">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">🏥 صيدلية المنزل</h1>
            <span id="lastUpdated" class="text-xs opacity-75">جاري التحديث...</span>
        </div>
    </nav>

    <div class="container mx-auto px-4 max-w-5xl">
        <div class="relative mb-10">
            <input type="text" id="searchInput" onkeyup="searchTable()" 
                   placeholder="ابحث عن اسم الدواء أو الغرض (مثلاً: صداع، مغص)..." 
                   class="w-full p-5 pr-12 rounded-2xl border-none shadow-xl focus:ring-2 focus:ring-green-500 outline-none text-lg">
            <span class="absolute left-4 top-5 text-2xl">🔍</span>
        </div>

        <div id="medicineGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-10">
                <div class="animate-spin inline-block w-8 h-8 border-4 border-green-500 border-t-transparent rounded-full mb-4"></div>
                <p class="text-gray-500">جاري قراءة بيانات الصيدلية...</p>
            </div>
        </div>
    </div>

    <script>
        // هــــــــام: ضع رابط الـ CSV الخاص بملف جوجل شيت هنا
        const GOOGLE_SHEET_CSV_URL = 'https://script.google.com/macros/s/AKfycbztwwIuuZvzS_XihZQTxqkEioE2qKfa4kSfqg4DJtyPH9ks_YcU3KJkOznDbmgybbNx2g/exec';

        async function init() {
            Papa.parse(GOOGLE_SHEET_CSV_URL, {
                download: true,
                header: true,
                complete: function(results) {
                    renderMedicines(results.data);
                    document.getElementById('lastUpdated').innerText = 'محدث الآن';
                }
            });
        }

        function renderMedicines(data) {
            const container = document.getElementById('medicineGrid');
            container.innerHTML = '';

            data.forEach(item => {
                if (!item.Name) return; 

                const isExpired = new Date(item.Expiry) < new Date();
                const statusColor = isExpired ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700';
                
                container.innerHTML += `
                    <div class="medicine-card bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden p-6 flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-start mb-4">
                                <span class="text-3xl">${item.Icon || '💊'}</span>
                                <span class="px-3 py-1 rounded-full text-xs font-bold ${statusColor}">
                                    ${isExpired ? 'منتهي' : 'صالح'}
                                </span>
                            </div>
                            <h3 class="text-xl font-bold text-gray-800 mb-1">${item.Name}</h3>
                            <p class="text-sm text-gray-500 mb-4">${item.Category || 'عام'}</p>
                        </div>
                        
                        <div class="border-t pt-4 mt-4 space-y-2 text-sm">
                            <div class="flex justify-between">
                                <span class="text-gray-400">تاريخ الانتهاء:</span>
                                <span class="font-semibold ${isExpired ? 'text-red-500' : 'text-gray-700'}">${item.Expiry}</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-gray-400">الكمية:</span>
                                <span class="font-bold text-green-600">${item.Quantity || 0}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function searchTable() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.getElementsByClassName('medicine-card');
            for (let card of cards) {
                card.style.display = card.innerText.toLowerCase().includes(input) ? "" : "none";
            }
        }

        init();
    </script>
</body>
</html>
