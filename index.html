<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صيدليتي الذكية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f3f4f6; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="min-h-screen pb-10">

    <header class="bg-emerald-600 text-white p-6 shadow-xl mb-8">
        <div class="container mx-auto text-center">
            <h1 class="text-3xl font-bold">💊 صيدلية المنزل الذكية</h1>
            <p class="opacity-80 mt-2">إدارة وتتبع الأدوية بسهولة</p>
        </div>
    </header>

    <main class="container mx-auto px-4 max-w-5xl">
        
        <section class="glass p-6 rounded-3xl shadow-sm border border-emerald-100 mb-10">
            <h2 class="text-xl font-bold text-emerald-800 mb-4 flex items-center">
                <span class="ml-2">➕</span> إضافة دواء جديد للقاعدة
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
                <input type="text" id="newName" placeholder="اسم الدواء" class="p-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-emerald-500 outline-none">
                <select id="newIcon" class="p-3 rounded-xl border border-gray-200 outline-none">
                    <option value="💊">💊 كبسولات</option>
                    <option value="🧪">🧪 شراب</option>
                    <option value="🧴">🧴 مرهم</option>
                    <option value="🩹">🩹 ضمادات</option>
                    <option value="🌡️">🌡️ أدوات</option>
                </select>
                <input type="date" id="newExpiry" class="p-3 rounded-xl border border-gray-200 outline-none text-gray-500">
                <input type="number" id="newQuantity" placeholder="الكمية" class="p-3 rounded-xl border border-gray-200 outline-none">
                <button onclick="saveToSheet()" id="btnSave" class="bg-emerald-600 text-white font-bold py-3 rounded-xl hover:bg-emerald-700 transition duration-300">
                    حفظ البيانات
                </button>
            </div>
        </section>

        <div class="relative mb-8">
            <input type="text" id="searchInput" onkeyup="searchMedicine()" 
                   placeholder="ابحث عن دواء بالاسم أو التصنيف..." 
                   class="w-full p-5 pr-12 rounded-2xl shadow-sm border-none focus:ring-2 focus:ring-emerald-500 outline-none text-lg">
            <span class="absolute left-5 top-5 text-xl">🔍</span>
        </div>

        <div id="medicineGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center text-gray-400 py-10">جاري جلب البيانات من جوجل شيت...</div>
        </div>
    </main>

    <script>
        // ----------------------------------------------------
        // الإعدادات: ضع روابطك هنا
        const SCRIPT_URL = 'رابط_DEPLOY_APP_SCRIPT_هنا'; // رابط الـ Web App
        const CSV_URL = 'رابط_نشر_الـ_CSV_هنا'; // رابط Publish to web (CSV)
        // ----------------------------------------------------

        // وظيفة الحفظ في جوجل شيت
        async function saveToSheet() {
            const btn = document.getElementById('btnSave');
            const data = {
                name: document.getElementById('newName').value,
                icon: document.getElementById('newIcon').value,
                expiry: document.getElementById('newExpiry').value,
                category: "عام", // يمكنك إضافة حقل له
                quantity: document.getElementById('newQuantity').value
            };

            if(!data.name || !data.expiry) return alert("يرجى ملء الاسم والتاريخ!");

            btn.innerText = "جاري الحفظ...";
            btn.disabled = true;

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', // لتجنب مشاكل الـ CORS البسيطة
                    body: JSON.stringify(data)
                });
                alert("تمت الإضافة! قد يستغرق ظهورها دقيقة.");
                location.reload();
            } catch (e) {
                alert("حدث خطأ في الاتصال");
            }
        }

        // وظيفة جلب وعرض البيانات
        function loadData() {
            Papa.parse(CSV_URL, {
                download: true,
                header: true,
                complete: function(results) {
                    displayData(results.data);
                }
            });
        }

        function displayData(data) {
            const grid = document.getElementById('medicineGrid');
            grid.innerHTML = '';
            
            data.forEach(item => {
                if(!item.Name) return;
                const isExpired = new Date(item.Expiry) < new Date();
                
                grid.innerHTML += `
                    <div class="medicine-card bg-white p-6 rounded-3xl shadow-sm border-b-4 ${isExpired ? 'border-red-400' : 'border-emerald-400'} hover:shadow-md transition">
                        <div class="flex justify-between mb-4">
                            <span class="text-4xl">${item.Icon || '💊'}</span>
                            <span class="text-xs font-bold uppercase p-1 px-2 rounded-lg ${isExpired ? 'bg-red-100 text-red-600' : 'bg-emerald-100 text-emerald-600'}">
                                ${isExpired ? 'منتهي الصلاحية' : 'صالح'}
                            </span>
                        </div>
                        <h3 class="text-xl font-bold text-gray-800">${item.Name}</h3>
                        <div class="mt-4 flex justify-between text-sm text-gray-500">
                            <span>📅 انتهاء: <b>${item.Expiry}</b></span>
                            <span>📦 كمية: <b>${item.Quantity}</b></span>
                        </div>
                    </div>
                `;
            });
        }

        function searchMedicine() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.getElementsByClassName('medicine-card');
            for (let card of cards) {
                card.style.display = card.innerText.toLowerCase().includes(input) ? "" : "none";
            }
        }

        // تشغيل الجلب عند فتح الصفحة
        window.onload = loadData;
    </script>
</body>
</html>
